<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7653907</title>
  
<style>
  :root {
    --blue:   #1B4F9B;
    --green:  #16A34A;
    --orange: #F59E0B;
    --bg:     #F8FAFB;
    --border: #D1E5D9;
    --text:   #111827;
    --muted:  #6B7280;
    --font:   'Jost', 'Segoe UI', Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.75;
    padding: 0 0 60px;
  }

  /* ── Header banner ── */
  .paper-header {
    background: var(--blue);
    color: #fff;
    padding: 28px 32px 22px;
    border-bottom: 4px solid var(--orange);
  }
  .paper-header .journal {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.75;
    margin-bottom: 6px;
  }
  .paper-header h1 {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.35;
    margin-bottom: 10px;
  }
  .paper-header .authors {
    font-size: 0.82rem;
    opacity: 0.85;
    margin-bottom: 8px;
  }
  .paper-meta {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .paper-meta a, .paper-meta span {
    font-size: 0.78rem;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    padding: 3px 9px;
    color: #fff;
    text-decoration: none;
    font-weight: 600;
  }
  .paper-meta a:hover { background: rgba(255,255,255,0.25); }

  /* ── Abstract box ── */
  .abstract-box {
    margin: 22px 32px;
    background: #EEF6F1;
    border-left: 4px solid var(--green);
    border-radius: 6px;
    padding: 16px 20px;
  }
  .abstract-box h2 {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 8px;
  }
  .abstract-box p {
    font-size: 0.9rem;
    color: #1F3A2A;
    line-height: 1.7;
  }

  /* ── Body content ── */
  .paper-body {
    padding: 0 32px;
  }

  /* ── Section headings ── */
  .paper-body h2 {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--blue);
    margin: 28px 0 10px;
    padding-bottom: 5px;
    border-bottom: 2px solid var(--border);
  }
  .paper-body h3 {
    font-size: 0.95rem;
    font-weight: 600;
    color: #1F3A2A;
    margin: 20px 0 8px;
  }
  .paper-body h4 {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--muted);
    margin: 14px 0 6px;
  }

  /* ── Paragraphs ── */
  .paper-body p {
    margin-bottom: 14px;
    font-size: 0.92rem;
  }

  /* ── Tables ── */
  .paper-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 18px 0;
    font-size: 0.85rem;
  }
  .paper-body th {
    background: var(--blue);
    color: #fff;
    padding: 8px 12px;
    text-align: left;
    font-weight: 600;
  }
  .paper-body td {
    padding: 7px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .paper-body tr:nth-child(even) td { background: #F0F7F4; }

  /* ── Section anchor highlight target ── */
  :target {
    background: #FFFBEB;
    outline: 2px solid var(--orange);
    border-radius: 4px;
    padding: 4px 6px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&display=swap" rel="stylesheet">

</head>
<body>
<div class="paper-header">
  <h1>7653907</h1>
  <div class="paper-meta"><span>2020</span><a href="https://doi.org/10.1038/s41598-020-75445-3&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;&lt;img" target="_blank">DOI: 10.1038/s41598-020-75445-3&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;&lt;img</a><a href="https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7653907/" target="_blank">PMC7653907</a></div>
</div>

<div class="paper-body">

</div>
</body>
</html>
